<!DOCTYPE html>
<html>
<head>
<title>My Profile</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

.hero{
    position:relative;
    height:100vh;
    background-image:url("Screenshot_2026-02-26-14-47-00-466.jpeg");
    background-size:cover;
    background-position:center 0px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#E0FFFF;
    overflow:hidden;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.4);
}

.hero::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:200px;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0%,
        #5F9EA0 100%
    );
    z-index:4;
}

#typing-text{
    position:relative;
    z-index:7;
    font-size:48px;
    opacity:0;
    background:rgba(0,0,0,0.4);
    padding:15px 30px;
    border-radius:10px;
    text-shadow:0 0 10px rgba(255,255,255,0.6);
    animation:fadeIn 1.5s forwards;
}

@keyframes fadeIn{
    to{opacity:1;}
}

canvas{
    position:absolute;
    inset:0;
}

#particles{z-index:1;}
#petals{z-index:3;}
#mouseCanvas{z-index:6; pointer-events:none;}

.profile{
    background-color:#5F9EA0;
    padding:100px 0;
    text-align:center;
}

.profile img{
    width:300px;
    border-radius:15px;
}
</style>
</head>

<body>

<section class="hero">
    <canvas id="particles"></canvas>
    <canvas id="petals"></canvas>
    <canvas id="mouseCanvas"></canvas>
    <h1 id="typing-text"></h1>
</section>

<section class="profile">
    <img src="Screenshot_2026-02-25-18-16-23-301.jpeg" alt="My Profile Image">
</section>

<script>

/* ---------- Resize Canvas ---------- */
function resizeCanvas(){
    document.querySelectorAll("canvas").forEach(c=>{
        c.width=window.innerWidth;
        c.height=window.innerHeight;
    });
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

/* ---------- Subtle Parallax ---------- */
window.addEventListener("scroll",()=>{
    const scrollY=window.scrollY;
    const hero=document.querySelector(".hero");
    hero.style.backgroundPosition=`center ${scrollY * 0.15}px`;
});

/* ---------- Typing ---------- */
const text="Welcome to My World";
const typingElement=document.getElementById("typing-text");
let index=0;

function typeLetter(){
    if(index<text.length){
        typingElement.innerHTML+=text.charAt(index);
        index++;
        setTimeout(typeLetter,80);
    }else{
        typingElement.style.textShadow="0 0 25px rgba(255,255,255,0.9)";
        setTimeout(()=>{
            typingElement.style.textShadow="0 0 10px rgba(255,255,255,0.6)";
        },800);
    }
}
window.onload=typeLetter;

/* ---------- Floating Sparkles ---------- */
const pCanvas=document.getElementById("particles");
const pCtx=pCanvas.getContext("2d");
let sparkles=[];

for(let i=0;i<40;i++){
    sparkles.push({
        x:Math.random()*pCanvas.width,
        y:Math.random()*pCanvas.height,
        radius:Math.random()*2,
        speed:Math.random()*0.5
    });
}

function animateSparkles(){
    pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
    pCtx.fillStyle="rgba(255,255,255,0.5)";
    sparkles.forEach(s=>{
        pCtx.beginPath();
        pCtx.arc(s.x,s.y,s.radius,0,Math.PI*2);
        pCtx.fill();
        s.y-=s.speed;
        if(s.y<0) s.y=pCanvas.height;
    });
    requestAnimationFrame(animateSparkles);
}
animateSparkles();

/* ---------- Natural Romantic Petals ---------- */
const petalCanvas=document.getElementById("petals");
const petalCtx=petalCanvas.getContext("2d");
let petals=[];

for(let i=0;i<20;i++){
    petals.push({
        x:Math.random()*petalCanvas.width,
        y:Math.random()*petalCanvas.height,
        size:22+Math.random()*12,
        speedY:0.6+Math.random()*0.6,
        sway:0.5+Math.random()*0.8,
        angle:Math.random()*Math.PI*2,
        tilt: (Math.random() - 0.5) * 0.3,
        rotation:Math.random()*Math.PI,
        rotationSpeed:(Math.random()-0.5)*0.01,
        color:Math.random()>0.5?"#FF69B4":"#FFB6C1"
    });
}

function drawPetal(p){
    petalCtx.save();
    petalCtx.translate(p.x,p.y);
    petalCtx.rotate(p.rotation);

    const w = p.size * 0.6;
    const h = p.size;

    petalCtx.beginPath();

    // Start at tapered base
    petalCtx.moveTo(0, h);

    // Left curve up
    petalCtx.bezierCurveTo(
        -w * 0.8, h * 0.6,
        -w, -h * 0.2,
        0, -h
    );

    // Right curve down
    petalCtx.bezierCurveTo(
        w, -h * 0.2,
        w * 0.8, h * 0.6,
        0, h
    );

    petalCtx.closePath();

    // Soft natural gradient (no glow)
    const gradient = petalCtx.createLinearGradient(0, -h, 0, h);
    gradient.addColorStop(0, p.color);
    gradient.addColorStop(1, "#d94f9d");

    petalCtx.fillStyle = gradient;
    petalCtx.fill();

    petalCtx.restore();
    }

function animatePetals(){
    petalCtx.clearRect(0,0,petalCanvas.width,petalCanvas.height);

    petals.forEach(p=>{
        p.y+=p.speedY;
        p.angle+=0.01;
        p.x+=Math.sin(p.angle)*p.sway;
        p.rotation += p.rotationSpeed + p.tilt * 0.002;

        if(p.y>petalCanvas.height){
            p.y=-20;
            p.x=Math.random()*petalCanvas.width;
        }

        drawPetal(p);
    });

    requestAnimationFrame(animatePetals);
}
animatePetals();

/* ---------- Stable Hero-Only Golden Mouse Magic ---------- */

const mouseCanvas = document.getElementById("mouseCanvas");
const mouseCtx = mouseCanvas.getContext("2d");
const heroSection = document.querySelector(".hero");

let particles = [];
let isTouching = false;
let pointerX = 0;
let pointerY = 0;

/* Fix canvas to screen */
mouseCanvas.style.position = "fixed";
mouseCanvas.style.top = "0";
mouseCanvas.style.left = "0";
mouseCanvas.style.width = "100%";
mouseCanvas.style.height = "100%";
mouseCanvas.style.pointerEvents = "none";

function resizeCanvas() {
    mouseCanvas.width = window.innerWidth;
    mouseCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

/* Check if inside hero */
function insideHero(x, y) {
    const rect = heroSection.getBoundingClientRect();
    return (
        x >= rect.left &&
        x <= rect.right &&
        y >= rect.top &&
        y <= rect.bottom
    );
}

/* Pointer events (works for mouse + touch) */
document.addEventListener("pointerdown", e => {
    if (insideHero(e.clientX, e.clientY)) {
        isTouching = true;
        pointerX = e.clientX;
        pointerY = e.clientY;
    }
});

document.addEventListener("pointermove", e => {
    pointerX = e.clientX;
    pointerY = e.clientY;
});

document.addEventListener("pointerup", () => {
    isTouching = false;
});

/* Stop effect if hero scrolls away */
window.addEventListener("scroll", () => {
    const rect = heroSection.getBoundingClientRect();
    if (rect.bottom <= 0) {
        isTouching = false;
    }
});

/* Animation loop */
function animateMouse() {
    mouseCtx.clearRect(0, 0, mouseCanvas.width, mouseCanvas.height);

    /* Generate sparkles only while touching AND inside hero */
    if (isTouching && insideHero(pointerX, pointerY)) {
        for (let i = 0; i < 4; i++) {
            particles.push({
                x: pointerX,
                y: pointerY,
                radius: 2 + Math.random() * 3,
                alpha: 1,
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5
            });
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];

        let glow = mouseCtx.createRadialGradient(
            p.x, p.y, 0,
            p.x, p.y, p.radius * 3
        );

        glow.addColorStop(0, "rgba(255,255,200," + p.alpha + ")");
        glow.addColorStop(0.4, "rgba(255,215,0," + p.alpha + ")");
        glow.addColorStop(1, "rgba(255,215,0,0)");

        mouseCtx.fillStyle = glow;
        mouseCtx.beginPath();
        mouseCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        mouseCtx.fill();

        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.03;

        if (p.alpha <= 0) {
            particles.splice(i, 1);
        }
    }

    requestAnimationFrame(animateMouse);
}

animateMouse();

</script>

</body>
</html>
