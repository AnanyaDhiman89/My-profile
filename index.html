<!DOCTYPE html>
<html>
<head>
<title>My Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">

<style>
/* ---------------- base ---------------- */
body{
    margin:0;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

/* ---------- video (bottom) ---------- */
.hero-video{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    min-width:100%;
    min-height:100%;
    object-fit: cover;
    object-position:center;
    z-index: 0;                 /* bottom-most */
    pointer-events: none;
}

/* ---------- hero container ---------- */
.hero{
    position: relative;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #E0FFFF;
    overflow: hidden;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.4);
    background-color: #000; /* fallback while video loads */
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* ----------- profile gradient ---------- */
.hero::after{  
    content:"";  
    position:absolute;  
    bottom:0;  
    left:0;  
    width:100%;  
    height:200px;  
    background:linear-gradient(  
        to bottom,  
        rgba(0,0,0,0) 0%,  
        #4682B4 100%  
    );  
    z-index:4;  
    pointer-events:none;
} 

/* main text */
#typing-text{
    position: relative;
    z-index: 9;                 /* top-most so text always visible */
    font-size:clamp(42px,6vw,48px);
    opacity:0;
    background:rgba(0,0,0,0.4);
    padding:15px 30px;
    border-radius:10px;
    text-shadow:0 0 10px rgba(255,255,255,0.6);
    animation:fadeIn 1.5s forwards;
}

@keyframes fadeIn{ to{opacity:1;} }

/* make all canvas children positioned absolute and full size */
.hero canvas{
    position:absolute;
    inset:0;
}

/* explicit z-index for canvases and layers */
/* tiny floating sparkles (background) */
#particles{ z-index: 1; }

/* petals should be above tiny particles but below tint */
#petals{ z-index: 2; }

/* mouse sparkle canvas (top sparkles + bursts) */
#mouseCanvas{ z-index: 5; pointer-events:none; }

/* ---------- profile sparkles (above profile bg, below profile video) ---------- */
#profileParticles{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;            /* below .profile-video (which has z-index:2) */
    pointer-events: none;
}

/* ensure profile container is the positioning parent (you already have position:relative on .profile) */
/* no further CSS needed — profile video remains z-index:2 so it's above the sparkles */

/* comment layer (glass boxes) - above everything interactive */
#comment-layer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index: 6;
    pointer-events: none;
}

/* comment boxes themselves allow pointer events */
.comment-box{
    position:absolute;
    padding:14px 24px;
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.25);
    color:#5EFFC8;
    font-size:32px;
    font-family:"Brush Script MT", cursive;
    opacity:0;
    transform:scale(0.9);
    transition:opacity 0.8s ease, transform 0.8s ease;
    max-width:300px;
    text-align:center;
    line-height:1.4;
    pointer-events:auto; /* comments receive pointer events */
}

/* profile area (below hero) */
.profile{
    position:relative;
    min-height:85vh;
    padding:100px 70px;
    overflow:hidden;

    background-image:url("2026-03-07_20-17-54_1.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.profile::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:200px;

    /* This matches hero gradient end color */
    background: linear-gradient(
        to bottom,
        #4682B4 0%,
        rgba(95,158,160,0) 100%
    );

    pointer-events:none;
}

.profile-video{
    position:absolute;
    top:70px;
    left:40px;

    width:420px;
    max-width:40vw;

    height:auto;

    border-radius:20px;

    border:3px solid #4682B4;

    box-shadow:0 0 15px #4682B4,
               0 0 30px rgba(70,130,180,0.7);

    transition: box-shadow 0.3s ease;

    cursor:pointer;

    z-index:2;
}

/* --------- Hover glow effect --------- */
/* For Desktop */
.profile-video:hover {
    box-shadow: 0 0 25px #4682B4,        /* Sharp inner glow */
                0 0 70px #4682B4,        /* Medium spread */
                0 0 110px rgba(70,130,180,0.8); /* Large outer halo */
    transition: box-shadow 0.3s ease-in-out; /* Makes the glow fade in smoothly */
}

/* For Mobile/Touch */
.profile-video.touch-glow {
    box-shadow: 0 0 30px #4682B4, 
                0 0 75px #4682B4, 
                0 0 130px rgba(70,130,180,0.9);
    transition: box-shadow 0.3s ease-in-out;
}

@media (max-width:1024px){

.profile-video{
    width:320px;
    top:80px;
}

}

/* ----------- Large screen adjustments ----------- */
@media (min-width:1400px){

.hero{
    min-height:100vh;
}

.hero-video{
    height:100%;
}

.comment-box{
    font-size:36px;
    padding:18px 30px;
    max-width:340px;
}

}

/* ---------- Mobile adjustments ---------- */
@media (max-width:600px){

.profile-video{
    width:240px;
    left:20px;
    top:110px;
}

#typing-text{
    font-size:30px;
    padding:12px 22px;
}

.comment-box{
    font-size:22px;
    padding:10px 16px;
    max-width:220px;
}

}

/* ---------- star buttons + panels (tablet-first) ---------- */

/* consolidated star buttons (tablet-first) */
.star-buttons{
  display: flex;
  flex-direction: column;
  gap: 18px;
  align-items: center;          /* moved to center for consistency */
  margin: 10px auto 20px;       /* center horizontally (auto left/right) */
  z-index: 3;
}

/* each row holds star + pill */
.star-row{
  display: flex;
  align-items: center;
  gap: 14px;
  justify-content: center;      /* keep star + pill centered */
}

/* glass pill to the right of star (consolidated) */
.glass-pill{
  min-width: 320px;
  max-width: 56vw;
  padding: 12px 22px;
  border-radius: 14px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(6px) saturate(.9);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(70,130,180,0.18);

  font-family: 'Cookie', cursive;
  font-size: 36px;              /* increased size */
  letter-spacing: 0.6px;

  color: #7FFFD4;               /* powder blue text */
  text-shadow: 0 0 6px rgba(127,255,212,0.6);

  text-align: center;           /* unified */
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  pointer-events: none;
}

/* star button container */
.star-btn{
  display:inline-grid;
  place-items:center;
  width:56px;
  height:56px;
  border-radius:12px;
  background:transparent;
  border:none;
  padding:0;
  margin:0;
  cursor:pointer;
  position:relative;
  z-index:4;
  -webkit-tap-highlight-color: transparent;
}

/* main star white -> we tint via CSS stroke if needed */
.star-main{ filter: drop-shadow(0 2px 6px rgba(70,130,180,0.55)); }

/* tiny orbiting stars */
.tiny-star{
  position:absolute;
  fill:#fff;
  opacity:0.95;
  transform-origin: center;
}

/* small offset positions */
.t1{ left: -3px; top: -6px; transform: translate(-6px,-6px); }
.t2{ right: -3px; bottom: -5px; transform: translate(6px,6px); }

/* spin animation for main star */
.spin { animation: star-spin 480ms cubic-bezier(.2,1,.2,1) both; }
@keyframes star-spin { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }

/* orbit animation for tiny stars */
.orbit.t1 { animation: orbit-1 900ms linear infinite; }
.orbit.t2 { animation: orbit-2 900ms linear infinite; }
@keyframes orbit-1 { 0% { transform: translate(-6px,-6px) rotate(0deg) } 100% { transform: translate(-6px,-6px) rotate(360deg) } }
@keyframes orbit-2 { 0% { transform: translate(6px,6px) rotate(0deg) } 100% { transform: translate(6px,6px) rotate(-360deg) } }

/* panels container */
.panels{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:0 30px 30px 30px;
}

/* panel collapsed -> max-height 0; open -> limit to 60vh */
.info-panel{
  width: calc(100% - 60px);
  max-width:900px;
  margin-left:auto; /* slide under pills (align with pills) */
  overflow:hidden;
  max-height:0;
  transition: max-height 360ms ease, opacity 360ms ease, transform 360ms ease;
  opacity:0;
  transform: translateY(-6px);
  border-radius:14px;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  position:relative;
  background-color: rgba(0,0,0,0.35); /* fallback if bg image missing */
}

/* when open */
.info-panel.open{
  max-height: 75vh;   /* increased vertical room */
  opacity: 1;
  transform: translateY(0);
}

/* inner area that scrolls */
.panel-inner{
  position:relative;
  padding:18px;
  height:100%;
  box-sizing:border-box;
  background: linear-gradient(rgba(0,0,0,0.0), rgba(0,0,0,0.0));
}

/* scrollable content area */
.panel-scroll{
  max-height: calc(75vh - 90px);
  overflow-y: auto;
  padding-right: 8px;
  color: #fff;
  line-height: 1.45;
}

/* panel heading */
.info-panel h2{
  margin: 0 0 12px 0;
  font-size: 26px;
  color: #fff;
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  letter-spacing: 1.2px;
}

/* panel background image layer (no blur) */
.info-panel::before{
  content:"";
  position:absolute;
  inset:0;
  background-repeat:no-repeat;
  background-size:cover;
  background-position:center;
  z-index:0;
  filter: grayscale(30%) brightness(85%); /* dulling */
  opacity:0.9;
}

/* ensure text sits above bg layer */
.info-panel .panel-inner{ position:relative; z-index:2; }

/* set each panel's background via data-bg attribute (JS will copy into ::before) */

/* ------------------ POSITION IMPROVEMENTS ------------------ */

/* Desktop: move stars a little downward */
@media (min-width:1025px){
  .star-buttons{
    margin-top: 120px;
  }
}

/* Tablet + Phone: move stars right side and down */
@media (max-width:1024px){
  .star-buttons{
    margin-top: 140px;
    margin-left: 50%;
    transform: translateX(10%);
  }

  /* Panel position adjustments for smaller screens */
  .panels{
    margin-top: 380px;
    align-items: center;
  }

  .info-panel{
    width: 90%;
    margin-left: auto;
    margin-right: auto;
  }
}

</style>
</head>

<body>

   <!-- 1) Video at the bottom -->
   <video id="heroVideo" class="hero-video" autoplay loop playsinline muted preload="auto">

<script>

/* --------- Video -------- */
const heroVideo = document.getElementById("heroVideo");

// ensure muted attribute is set (helps autoplay on mobile/desktop)
heroVideo.muted = true;

// Try to play now (muted autoplay usually allowed)
heroVideo.play().catch(()=> {
    // play may fail on some browsers until interaction — that's okay
});

// On first user click/tap, unmute and play with audio
document.addEventListener("click", () => {
    heroVideo.muted = false;
    heroVideo.play().catch(()=>{/* ignore */});
}, { once: true });

/* ---------- Resize Canvas ---------- */
function resizeCanvas(){
    document.querySelectorAll("canvas").forEach(c=>{
        c.width=window.innerWidth;
        c.height=window.innerHeight;
    });
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

/* ---------- Typing ---------- */
const text="Welcome to My Fantasy";
const typingElement=document.getElementById("typing-text");
let index=0;

function typeLetter(){
    if(index<text.length){
        typingElement.innerHTML+=text.charAt(index);
        index++;
        setTimeout(typeLetter,80);
    }else{
        typingElement.style.textShadow="0 0 25px rgba(255,255,255,0.9)";
        setTimeout(()=>{
            typingElement.style.textShadow="0 0 10px rgba(255,255,255,0.6)";
        },800);
    }
}
window.onload=typeLetter;

/* ---------- Floating Sparkles ---------- */
const pCanvas=document.getElementById("particles");
const pCtx=pCanvas.getContext("2d");
let sparkles=[];

for(let i=0;i<40;i++){
    sparkles.push({
        x:Math.random()*pCanvas.width,
        y:Math.random()*pCanvas.height,
        radius:Math.random()*2,
        speed:Math.random()*0.6
    });
}

function animateSparkles(){
    pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
    pCtx.fillStyle="rgba(255,255,255,0.5)";
    sparkles.forEach(s=>{
        pCtx.beginPath();
        pCtx.arc(s.x,s.y,s.radius,0,Math.PI*2);
        pCtx.fill();
        s.y-=s.speed;
        if(s.y<0) s.y=pCanvas.height;
    });
    requestAnimationFrame(animateSparkles);
}
animateSparkles();

/* ---------- Profile Floating Sparkles (profileParticles) ---------- */
const profileCanvas = document.getElementById("profileParticles");
const profileCtx = profileCanvas.getContext("2d");
const profileSection = document.querySelector(".profile");

let profileSparkles = [];

// helper to size profileCanvas to profile section
function resizeProfileCanvas(){
    // set canvas pixel size to profile element size (keeps sparkles fixed to section)
    const rect = profileSection.getBoundingClientRect();
    profileCanvas.width = Math.max(1, Math.floor(rect.width));
    profileCanvas.height = Math.max(1, Math.floor(rect.height));
}

// (re)create particles after sizing so coordinates match
function createProfileSparkles(count = 30){
    profileSparkles = [];
    for(let i=0;i<count;i++){
        profileSparkles.push({
            x: Math.random() * profileCanvas.width,
            y: Math.random() * profileCanvas.height,
            radius: Math.random() * 2,
            speed: 0.2 + Math.random() * 0.6
        });
    }
}

// animation loop
function animateProfileSparkles(){
    if (!profileCanvas || !profileCtx) return;
    profileCtx.clearRect(0,0,profileCanvas.width,profileCanvas.height);
    profileCtx.fillStyle = "rgba(255,255,255,0.45)";

    profileSparkles.forEach(s => {
        profileCtx.beginPath();
        profileCtx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
        profileCtx.fill();

        s.y -= s.speed;
        if (s.y < 0) s.y = profileCanvas.height + Math.random() * 20;
    });

    requestAnimationFrame(animateProfileSparkles);
}

// initialize sizes & particles (call once now)
resizeProfileCanvas();
createProfileSparkles(30); // 30 = slightly more subtle than hero's 40
animateProfileSparkles();

// keep profile canvas sized when the window or layout changes
window.addEventListener('resize', () => {
    // keep original resizeCanvas (you already have) but ALSO resize the profile canvas to match section
    resizeProfileCanvas();
    // re-create particles so they distribute correctly across the new size
    createProfileSparkles(30);
});

/* ---------- Natural Romantic Petals ---------- */
const petalCanvas=document.getElementById("petals");
const petalCtx=petalCanvas.getContext("2d");
let petals=[];

for(let i=0;i<20;i++){
    petals.push({
        x:Math.random()*petalCanvas.width,
        y:Math.random()*petalCanvas.height,
        size:
        (window.innerWidth < 600
            ? 16 + Math.random() * 10          // Mobile (unchanged)
            : window.innerWidth < 1024
            ? 22 + Math.random() * 12          // Tablet (unchanged)
            : 26 + Math.random() * 14          // Desktop (slightly bigger)
        ),
        speedY:0.6+Math.random()*0.6,
        sway:0.5+Math.random()*0.8,
        angle:Math.random()*Math.PI*2,
        tilt: (Math.random() - 0.5) * 0.3,
        rotation:Math.random()*Math.PI,
        rotationSpeed:(Math.random()-0.5)*0.01,
        color:Math.random()>0.5?"#FF69B4":"#FFB6C1"
    });
}

function drawPetal(p){
    petalCtx.save();
    petalCtx.translate(p.x,p.y);
    petalCtx.rotate(p.rotation);

    const w = p.size * 0.6;
    const h = p.size;

    petalCtx.beginPath();

    // Start at tapered base
    petalCtx.moveTo(0, h);

    // Left curve up
    petalCtx.bezierCurveTo(
        -w * 0.8, h * 0.6,
        -w, -h * 0.2,
        0, -h
    );

    // Right curve down
    petalCtx.bezierCurveTo(
        w, -h * 0.2,
        w * 0.8, h * 0.6,
        0, h
    );

    petalCtx.closePath();

    // Soft natural gradient (no glow)
    const gradient = petalCtx.createLinearGradient(0, -h, 0, h);
    gradient.addColorStop(0, p.color);
    gradient.addColorStop(1, "#d94f9d");

    petalCtx.fillStyle = gradient;
    petalCtx.fill();

    petalCtx.restore();
    }

function animatePetals(){
    petalCtx.clearRect(0,0,petalCanvas.width,petalCanvas.height);

    petals.forEach(p=>{
        p.y+=p.speedY;
        p.angle+=0.01;
        p.x+=Math.sin(p.angle)*p.sway;
        p.rotation += p.rotationSpeed + p.tilt * 0.002;

        if(p.y>petalCanvas.height){
            p.y=-20;
            p.x=Math.random()*petalCanvas.width;
        }

        drawPetal(p);
    });

    requestAnimationFrame(animatePetals);
}
animatePetals();

/* ---------- Hero-Only Golden Mouse Magic ---------- */

const mouseCanvas = document.getElementById("mouseCanvas");
const mouseCtx = mouseCanvas.getContext("2d");
    
const heroSection = document.querySelector(".hero");

let mouseParticles = [];
let isPointerDown = false;
let lastX = 0;
let lastY = 0;
let burstParticles = [];
let lastTapTime = 0;

/* Make canvas fixed */
mouseCanvas.style.pointerEvents = "none";

/* Check if pointer is inside hero section */
function isInsideHero(x, y) {
    const rect = heroSection.getBoundingClientRect();
    return (
        x >= rect.left &&
        x <= rect.right &&
        y >= rect.top &&
        y <= rect.bottom
    );
}

/* Continuous sparkle generator while finger is down */
function generateSparkles() {
    if (isPointerDown && isInsideHero(lastX, lastY)) {
        for (let i = 0; i < 4; i++) {
            mouseParticles.push({
                x: lastX,
                y: lastY,
                radius: 2 + Math.random() * 3,
                alpha: 1,
                speedX: (Math.random() - 0.5) * 1.5,
                speedY: (Math.random() - 0.5) * 1.5
            });
        }
    }
}

/* ---------- Improved Touch Tracking ---------- */

let isTouching = false;
let touchX = 0;
let touchY = 0;

/* Touch events (mobile) */
document.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    touchX = touch.clientX;
    touchY = touch.clientY;
    if (isInsideHero(touchX, touchY)) {
        isTouching = true;
    }
}, { passive: true });

document.addEventListener("touchmove", (e) => {
    const touch = e.touches[0];
    touchX = touch.clientX;
    touchY = touch.clientY;
}, { passive: true });

document.addEventListener("touchend", () => {
    isTouching = false;
});

/* Stop sparkle if hero not visible (keeps things tidy while scrolling) */
window.addEventListener("scroll", () => {
    const rect = heroSection.getBoundingClientRect();
    if (rect.bottom <= 0) {
        isTouching = false;
    }
});

/* Pointer events (desktop & pointer devices) */
document.addEventListener("pointerdown", (e) => {
    if (isInsideHero(e.clientX, e.clientY)) {
        isTouching = true;
        touchX = e.clientX;
        touchY = e.clientY;
    }
});

document.addEventListener("pointermove", (e) => {
    touchX = e.clientX;
    touchY = e.clientY;
});

document.addEventListener("pointerup", () => {
    isTouching = false;
});

/* Animate */
function animateMouse() {
    
    mouseCtx.clearRect(0, 0, mouseCanvas.width, mouseCanvas.height);
    
    /* Generate sparkles only while touching inside hero */
if (isTouching && isInsideHero(touchX, touchY)) {
    for (let i = 0; i < 4; i++) {
        mouseParticles.push({
            x: touchX,
            y: touchY,
            radius: 2 + Math.random() * 3,
            alpha: 1,
            speedX: (Math.random() - 0.5) * (window.innerWidth < 600 ? 1.8 : 3.5),
            speedY: (Math.random() - 0.5) * (window.innerWidth < 600 ? 1.8 : 3.5),
            rotation: Math.random() * Math.PI
        });
    }
    }
    
    for (let i = mouseParticles.length - 1; i >= 0; i--) {
        let p = mouseParticles[i];

        let gradient = mouseCtx.createRadialGradient(
        p.x, p.y, 0,
        p.x, p.y, p.radius * 3
        );

        gradient.addColorStop(0, "rgba(255,255,200," + p.alpha + ")");
        gradient.addColorStop(0.4, "rgba(255,215,0," + p.alpha + ")");
        gradient.addColorStop(1, "rgba(255,215,0,0)");

        mouseCtx.fillStyle = gradient;
        mouseCtx.beginPath();
        mouseCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        mouseCtx.fill();

        p.x += p.speedX;
        p.y += p.speedY;
        p.alpha -= 0.02;

        if (p.alpha <= 0) {
            mouseParticles.splice(i, 1);
        }
    }

    // Render burst particles
for (let i = burstParticles.length - 1; i >= 0; i--) {
    let p = burstParticles[i];

    let gradient = mouseCtx.createRadialGradient(
        p.x, p.y, 0,
        p.x, p.y, p.radius * 3
    );

    gradient.addColorStop(0, "rgba(255,215,0," + p.alpha + ")");
    gradient.addColorStop(1, "rgba(255,215,0,0)");

    mouseCtx.fillStyle = gradient;
    mouseCtx.beginPath();
    mouseCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    mouseCtx.fill();

    p.x += p.speedX;
    p.y += p.speedY;
    p.alpha -= 0.03;

    if (p.alpha <= 0) {
        burstParticles.splice(i, 1);
    }
    }

    requestAnimationFrame(animateMouse);
}

animateMouse();

/* --------- Golden Burst Of Comments ---------- */
    
function createGoldenBurst(x, y){
    for(let i=0; i<80; i++){   // increased from 25 → 60
        burstParticles.push({
            x: x,
            y: y,
            radius: 2 + Math.random()*5,  // slightly bigger particles
            alpha: 1,
            speedX: (Math.random()-0.5)*9,  // stronger explosion
            speedY: (Math.random()-0.5)*9
        });
    }
}

/* ---------- Floating Comments ---------- */

const comments = [
    "You are absolutely magical! ✨",
    "Believe in yourself — always! 💙",
    "You inspire me every single day! 🌸",
    "Your energy is unmatched! 🔥",
    "You are truly one of a kind! 💫",
    "Keep shining, beautiful soul! 🌙"
];

const commentLayer = document.getElementById("comment-layer");

function showRandomComment() {
    const box = document.createElement("div");
    box.classList.add("comment-box");

    box.textContent = comments[Math.floor(Math.random() * comments.length)];

    const hero = document.querySelector(".hero");

    const maxWidth = hero.offsetWidth - 300;
    const maxHeight = hero.offsetHeight - 120;

    const left = Math.random() * maxWidth;
    const top = Math.random() * maxHeight;

    box.style.left = left + "px";
    box.style.top = top + "px";

    commentLayer.appendChild(box);

    /* Prevent mobile double-tap zoom */
    box.style.touchAction = "manipulation";

    let tapCount = 0;
    let tapTimer = null;

    function triggerBurst() {
        const rect = box.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        createGoldenBurst(centerX, centerY);

        if (commentLayer.contains(box)) {
            commentLayer.removeChild(box);
        }

        // Reset scheduler and schedule next comment after 1 seconds
        clearTimeout(commentTimer);
        scheduleNextComment(1000); // 1000 ms = 1 seconds
    }

    box.addEventListener("pointerdown", function () {
        tapCount++;

        if (tapCount === 1) {
            tapTimer = setTimeout(() => {
                tapCount = 0;
            }, 300);
        } else if (tapCount === 2) {
            clearTimeout(tapTimer);
            tapCount = 0;
            triggerBurst();
        }
    });

    // Make the box visible, then hide & remove it after a delay
    setTimeout(() => {
        box.style.opacity = "1";
        box.style.transform = "scale(1)";
    }, 100);

    setTimeout(() => {
        box.style.opacity = "0";
        box.style.transform = "scale(0.9)";
    }, 3000);

    setTimeout(() => {
        if (commentLayer.contains(box)) {
            commentLayer.removeChild(box);
        }
    }, 4000);
    }

let commentTimer;

/**
 * scheduleNextComment(delay)
 * - delay (optional): milliseconds until next comment; defaults to 3000
 */
function scheduleNextComment(delay = 3000) {
    // clear any existing to be safe
    clearTimeout(commentTimer);
    commentTimer = setTimeout(() => {
        showRandomComment();
        scheduleNextComment(); // after showing, schedule next with default delay
    }, delay);
    }

/* ---------- Profile Click Video ---------- */

const profileVideo = document.getElementById("profileVideo");

profileVideo.muted = true;

profileVideo.addEventListener("click", function(){

    if(profileVideo.paused){
        profileVideo.play();
    }

});

profileVideo.addEventListener("ended", function(){

    profileVideo.currentTime = 0;
    profileVideo.pause();

});

showRandomComment();
scheduleNextComment(); // starts the loop with default 3000ms for normal auto-appear

/* ---------- Touch Hover Effect ---------- */

const profileVid = document.getElementById("profileVideo");

profileVid.addEventListener("touchstart", () => {
    profileVid.classList.add("touch-glow");
});

profileVid.addEventListener("touchend", () => {
    setTimeout(()=>{
        profileVid.classList.remove("touch-glow");
    },300);
});

</script>

<script>

// ---------- Star buttons -> panels behavior ----------
(function(){
  const ROWS = document.querySelectorAll('.star-row');

  function closeAllPanels() {
    document.querySelectorAll('.info-panel.open').forEach(p=>{
      p.classList.remove('open');
      const btn = document.querySelector(`.star-row[data-panel="${p.id}"] .star-btn`);
      if(btn) btn.setAttribute('aria-expanded','false');
    });
  }

  ROWS.forEach(row=>{
    const btn = row.querySelector('.star-btn');
    const t1 = btn.querySelector('.t1');
    const t2 = btn.querySelector('.t2');
    const mainStar = btn.querySelector('.star-main');
    const targetId = row.dataset.panel;
    const panel = document.getElementById(targetId);

    // set panel background from data-bg attribute
    const bg = panel.dataset.bg || '';
    if(bg){
      panel.style.setProperty('--panel-bg', bg);
      // copy into pseudo-element by injecting an inline style rule:
      panel.style.setProperty('--panel-background', bg);
      panel.style.backgroundImage = 'none'; // keep fallback
      // we will set ::before via inline style injection (supported by browsers) —
      // simpler approach: set background on pseudo via element style using a CSS variable
      panel.style.setProperty('--bg-url', bg);
      panel.style.setProperty('--bg-filter', 'grayscale(30%) brightness(85%)');
      // but simpler for compatibility: directly set background on panel::before is not possible via JS,
      // so we set the element's style backgroundImage and lower opacity so it matches visual intent:
      panel.style.backgroundImage = bg.replace(/^url\(|\)$/g, '');
      // fallback: if `data-bg="url('x.jpg')"` then the above strips the url(). So do this:
      const urlmatch = panel.dataset.bg.match(/url\((['"]?)(.+?)\1\)/);
      if(urlmatch){
        panel.style.backgroundImage = `url("${urlmatch[2]}")`;
        panel.style.filter = 'none';
      }
    }

    const spinDuration = 480; // ms (matches CSS)

    function togglePanel() {
      const isOpen = panel.classList.contains('open');

      if(isOpen){
        // close
        panel.classList.remove('open');
        btn.setAttribute('aria-expanded','false');
        // play a quick spin-back for fun
        mainStar.classList.add('spin');
        setTimeout(()=> mainStar.classList.remove('spin'), spinDuration);
        t1.classList.remove('orbit');
        t2.classList.remove('orbit');
        return;
      }

      // open: first spin then open panel
      mainStar.classList.add('spin');
      t1.classList.add('orbit');
      t2.classList.add('orbit');

      // close other panels
      closeAllPanels();

      setTimeout(()=>{
        panel.classList.add('open');
        btn.setAttribute('aria-expanded','true');
        // stop spin but keep orbit while open
        mainStar.classList.remove('spin');
      }, spinDuration);
    }

    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      togglePanel();
    });

    // close when clicking outside any panel
    document.addEventListener('click', (ev)=>{
      if(!row.contains(ev.target) && !panel.contains(ev.target)){
        // if clicked outside all star-rows and panel -> close this panel
        if(panel.classList.contains('open')){
          panel.classList.remove('open');
          btn.setAttribute('aria-expanded','false');
          t1.classList.remove('orbit');
          t2.classList.remove('orbit');
        }
      }
    });

    // keyboard: Esc closes
    document.addEventListener('keydown', (ev)=>{
      if(ev.key === 'Escape'){
        if(panel.classList.contains('open')){
          panel.classList.remove('open');
          btn.setAttribute('aria-expanded','false');
          t1.classList.remove('orbit');
          t2.classList.remove('orbit');
        }
      }
    });

    // touch: simple swipe-down to close for that panel
    let startY = null;
    panel.addEventListener('touchstart', (e)=>{
      startY = e.touches[0].clientY;
    }, {passive:true});
    panel.addEventListener('touchend', (e)=>{
      if(startY === null) return;
      const endY = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientY : null;
      if(endY && (endY - startY) > 80){ // swipe down
        panel.classList.remove('open');
        btn.setAttribute('aria-expanded','false');
        t1.classList.remove('orbit');
        t2.classList.remove('orbit');
      }
      startY = null;
    });
  });
})();

</script>
