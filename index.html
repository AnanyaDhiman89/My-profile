<!DOCTYPE html>
<html>
<head>
<title>My Profile</title>

<style>
/* ---------------- base ---------------- */
body{
    margin:0;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

/* ---------- video (bottom) ---------- */
.hero-video{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;                 /* bottom-most */
    pointer-events: none;
}

/* ---------- hero container ---------- */
.hero{
    position: relative;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #E0FFFF;
    overflow: hidden;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.4);
    background-color: #000; /* fallback while video loads */
}

/* ----------- profile gradient ---------- */
.hero::after{  
    content:"";  
    position:absolute;  
    bottom:0;  
    left:0;  
    width:100%;  
    height:200px;  
    background:linear-gradient(  
        to bottom,  
        rgba(0,0,0,0) 0%,  
        #4682B4 100%  
    );  
    z-index:4;  
    pointer-events:none;
} 

/* main text */
#typing-text{
    position: relative;
    z-index: 9;                 /* top-most so text always visible */
    font-size:48px;
    opacity:0;
    background:rgba(0,0,0,0.4);
    padding:15px 30px;
    border-radius:10px;
    text-shadow:0 0 10px rgba(255,255,255,0.6);
    animation:fadeIn 1.5s forwards;
}

@keyframes fadeIn{ to{opacity:1;} }

/* make all canvas children positioned absolute and full size */
.hero canvas{
    position:absolute;
    inset:0;
}

/* explicit z-index for canvases and layers */
/* tiny floating sparkles (background) */
#particles{ z-index: 1; }

/* petals should be above tiny particles but below tint */
#petals{ z-index: 2; }

/* mouse sparkle canvas (top sparkles + bursts) */
#mouseCanvas{ z-index: 5; pointer-events:none; }

/* comment layer (glass boxes) - above everything interactive */
#comment-layer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index: 6;
    pointer-events: none;
}

/* comment boxes themselves allow pointer events */
.comment-box{
    position:absolute;
    padding:14px 24px;
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.25);
    color:#2B2E8A;
    font-size:32px;
    font-family:"Brush Script MT", cursive;
    opacity:0;
    transform:scale(0.9);
    transition:opacity 0.8s ease, transform 0.8s ease;
    max-width:300px;
    text-align:center;
    pointer-events:auto; /* comments receive pointer events */
}

/* profile area (below hero) */
.profile{
    position:relative;
    padding:120px 0;
    text-align:center;
    overflow:hidden;

    
    background-image: url("2026-03-07_20-17-54_1.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.profile::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:200px;

    /* This matches hero gradient end color */
    background: linear-gradient(
        to bottom,
        #4682B4 0%,
        rgba(95,158,160,0) 100%
    );

    pointer-events:none;
}

.profile img{
    position:relative;
    z-index:2;
    width:300px;
    border-radius:15px;
}

</style>
</head>

<body>

<section class="hero">

   <!-- 1) Video at the bottom -->
   <video id="heroVideo" class="hero-video" autoplay loop playsinline muted preload="auto">
    <source src="0fc0ef491b19c10e6b79742dedff618c_720w.mp4" type="video/mp4">
   </video>

   <!-- 2) tiny background sparkles canvas -->
   <canvas id="particles"></canvas>

   <!-- 3) petals canvas -->
   <canvas id="petals"></canvas>
    
   <!-- 5) comment layer (boxes) -->
   <div id="comment-layer"></div>

   <!-- 6) mouse sparkle canvas (top) -->
   <canvas id="mouseCanvas"></canvas>

   <!-- 7) main center text -->
   <h1 id="typing-text"></h1>

</section>

<!-- === paste this directly AFTER the hero </section> and BEFORE your <script> === -->
<section class="profile">
    <img src="Screenshot_2026-03-07-20-08-22-514.jpeg" alt="My Profile Image">
</section>

<script>

/* --------- Video -------- */
const heroVideo = document.getElementById("heroVideo");

// ensure muted attribute is set (helps autoplay on mobile/desktop)
heroVideo.muted = true;

// Try to play now (muted autoplay usually allowed)
heroVideo.play().catch(()=> {
    // play may fail on some browsers until interaction — that's okay
});

// On first user click/tap, unmute and play with audio
document.addEventListener("click", () => {
    heroVideo.muted = false;
    heroVideo.play().catch(()=>{/* ignore */});
}, { once: true });

/* ---------- Resize Canvas ---------- */
function resizeCanvas(){
    document.querySelectorAll("canvas").forEach(c=>{
        c.width=window.innerWidth;
        c.height=window.innerHeight;
    });
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

/* ---------- Typing ---------- */
const text="Welcome to My World";
const typingElement=document.getElementById("typing-text");
let index=0;

function typeLetter(){
    if(index<text.length){
        typingElement.innerHTML+=text.charAt(index);
        index++;
        setTimeout(typeLetter,80);
    }else{
        typingElement.style.textShadow="0 0 25px rgba(255,255,255,0.9)";
        setTimeout(()=>{
            typingElement.style.textShadow="0 0 10px rgba(255,255,255,0.6)";
        },800);
    }
}
window.onload=typeLetter;

/* ---------- Floating Sparkles ---------- */
const pCanvas=document.getElementById("particles");
const pCtx=pCanvas.getContext("2d");
let sparkles=[];

for(let i=0;i<40;i++){
    sparkles.push({
        x:Math.random()*pCanvas.width,
        y:Math.random()*pCanvas.height,
        radius:Math.random()*2,
        speed:Math.random()*0.5
    });
}

function animateSparkles(){
    pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
    pCtx.fillStyle="rgba(255,255,255,0.5)";
    sparkles.forEach(s=>{
        pCtx.beginPath();
        pCtx.arc(s.x,s.y,s.radius,0,Math.PI*2);
        pCtx.fill();
        s.y-=s.speed;
        if(s.y<0) s.y=pCanvas.height;
    });
    requestAnimationFrame(animateSparkles);
}
animateSparkles();

/* ---------- Natural Romantic Petals ---------- */
const petalCanvas=document.getElementById("petals");
const petalCtx=petalCanvas.getContext("2d");
let petals=[];

for(let i=0;i<20;i++){
    petals.push({
        x:Math.random()*petalCanvas.width,
        y:Math.random()*petalCanvas.height,
        size:22+Math.random()*12,
        speedY:0.6+Math.random()*0.6,
        sway:0.5+Math.random()*0.8,
        angle:Math.random()*Math.PI*2,
        tilt: (Math.random() - 0.5) * 0.3,
        rotation:Math.random()*Math.PI,
        rotationSpeed:(Math.random()-0.5)*0.01,
        color:Math.random()>0.5?"#FF69B4":"#FFB6C1"
    });
}

function drawPetal(p){
    petalCtx.save();
    petalCtx.translate(p.x,p.y);
    petalCtx.rotate(p.rotation);

    const w = p.size * 0.6;
    const h = p.size;

    petalCtx.beginPath();

    // Start at tapered base
    petalCtx.moveTo(0, h);

    // Left curve up
    petalCtx.bezierCurveTo(
        -w * 0.8, h * 0.6,
        -w, -h * 0.2,
        0, -h
    );

    // Right curve down
    petalCtx.bezierCurveTo(
        w, -h * 0.2,
        w * 0.8, h * 0.6,
        0, h
    );

    petalCtx.closePath();

    // Soft natural gradient (no glow)
    const gradient = petalCtx.createLinearGradient(0, -h, 0, h);
    gradient.addColorStop(0, p.color);
    gradient.addColorStop(1, "#d94f9d");

    petalCtx.fillStyle = gradient;
    petalCtx.fill();

    petalCtx.restore();
    }

function animatePetals(){
    petalCtx.clearRect(0,0,petalCanvas.width,petalCanvas.height);

    petals.forEach(p=>{
        p.y+=p.speedY;
        p.angle+=0.01;
        p.x+=Math.sin(p.angle)*p.sway;
        p.rotation += p.rotationSpeed + p.tilt * 0.002;

        if(p.y>petalCanvas.height){
            p.y=-20;
            p.x=Math.random()*petalCanvas.width;
        }

        drawPetal(p);
    });

    requestAnimationFrame(animatePetals);
}
animatePetals();

/* ---------- Hero-Only Golden Mouse Magic ---------- */

const mouseCanvas = document.getElementById("mouseCanvas");
const mouseCtx = mouseCanvas.getContext("2d");
    
const heroSection = document.querySelector(".hero");

let mouseParticles = [];
let isPointerDown = false;
let lastX = 0;
let lastY = 0;
let burstParticles = [];
let lastTapTime = 0;

/* Make canvas fixed */
mouseCanvas.style.pointerEvents = "none";

/* Check if pointer is inside hero section */
function isInsideHero(x, y) {
    const rect = heroSection.getBoundingClientRect();
    return (
        x >= rect.left &&
        x <= rect.right &&
        y >= rect.top &&
        y <= rect.bottom
    );
}

/* Continuous sparkle generator while finger is down */
function generateSparkles() {
    if (isPointerDown && isInsideHero(lastX, lastY)) {
        for (let i = 0; i < 4; i++) {
            mouseParticles.push({
                x: lastX,
                y: lastY,
                radius: 2 + Math.random() * 3,
                alpha: 1,
                speedX: (Math.random() - 0.5) * 1.5,
                speedY: (Math.random() - 0.5) * 1.5
            });
        }
    }
}

/* ---------- Improved Touch Tracking ---------- */

let isTouching = false;
let touchX = 0;
let touchY = 0;

/* Touch events (mobile) */
document.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    touchX = touch.clientX;
    touchY = touch.clientY;
    if (isInsideHero(touchX, touchY)) {
        isTouching = true;
    }
}, { passive: true });

document.addEventListener("touchmove", (e) => {
    const touch = e.touches[0];
    touchX = touch.clientX;
    touchY = touch.clientY;
}, { passive: true });

document.addEventListener("touchend", () => {
    isTouching = false;
});

/* Stop sparkle if hero not visible (keeps things tidy while scrolling) */
window.addEventListener("scroll", () => {
    const rect = heroSection.getBoundingClientRect();
    if (rect.bottom <= 0) {
        isTouching = false;
    }
});

/* Pointer events (desktop & pointer devices) */
document.addEventListener("pointerdown", (e) => {
    if (isInsideHero(e.clientX, e.clientY)) {
        isTouching = true;
        touchX = e.clientX;
        touchY = e.clientY;
    }
});

document.addEventListener("pointermove", (e) => {
    touchX = e.clientX;
    touchY = e.clientY;
});

document.addEventListener("pointerup", () => {
    isTouching = false;
});

/* Animate */
function animateMouse() {
    
    mouseCtx.clearRect(0, 0, mouseCanvas.width, mouseCanvas.height);
    
    /* Generate sparkles only while touching inside hero */
if (isTouching && isInsideHero(touchX, touchY)) {
    for (let i = 0; i < 4; i++) {
        mouseParticles.push({
            x: touchX,
            y: touchY,
            radius: 2 + Math.random() * 3,
            alpha: 1,
            speedX: (Math.random() - 0.5) * 3.5,
            speedY: (Math.random() - 0.5) * 3.5,
            rotation: Math.random() * Math.PI
        });
    }
    }
    
    for (let i = mouseParticles.length - 1; i >= 0; i--) {
        let p = mouseParticles[i];

        let gradient = mouseCtx.createRadialGradient(
        p.x, p.y, 0,
        p.x, p.y, p.radius * 3
        );

        gradient.addColorStop(0, "rgba(255,255,200," + p.alpha + ")");
        gradient.addColorStop(0.4, "rgba(255,215,0," + p.alpha + ")");
        gradient.addColorStop(1, "rgba(255,215,0,0)");

        mouseCtx.fillStyle = gradient;
        mouseCtx.beginPath();
        mouseCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        mouseCtx.fill();

        p.x += p.speedX;
        p.y += p.speedY;
        p.alpha -= 0.02;

        if (p.alpha <= 0) {
            mouseParticles.splice(i, 1);
        }
    }

    // Render burst particles
for (let i = burstParticles.length - 1; i >= 0; i--) {
    let p = burstParticles[i];

    let gradient = mouseCtx.createRadialGradient(
        p.x, p.y, 0,
        p.x, p.y, p.radius * 3
    );

    gradient.addColorStop(0, "rgba(255,215,0," + p.alpha + ")");
    gradient.addColorStop(1, "rgba(255,215,0,0)");

    mouseCtx.fillStyle = gradient;
    mouseCtx.beginPath();
    mouseCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    mouseCtx.fill();

    p.x += p.speedX;
    p.y += p.speedY;
    p.alpha -= 0.03;

    if (p.alpha <= 0) {
        burstParticles.splice(i, 1);
    }
    }

    requestAnimationFrame(animateMouse);
}

animateMouse();

/* --------- Golden Burst Of Comments ---------- */
    
function createGoldenBurst(x, y){
    for(let i=0; i<80; i++){   // increased from 25 → 60
        burstParticles.push({
            x: x,
            y: y,
            radius: 2 + Math.random()*5,  // slightly bigger particles
            alpha: 1,
            speedX: (Math.random()-0.5)*9,  // stronger explosion
            speedY: (Math.random()-0.5)*9
        });
    }
}

/* ---------- Floating Comments ---------- */

const comments = [
    "You are absolutely magical! ✨",
    "Believe in yourself — always! 💙",
    "You inspire me every single day! 🌸",
    "Your energy is unmatched! 🔥",
    "You are truly one of a kind! 💫",
    "Keep shining, beautiful soul! 🌙"
];

const commentLayer = document.getElementById("comment-layer");

function showRandomComment() {
    const box = document.createElement("div");
    box.classList.add("comment-box");

    box.textContent = comments[Math.floor(Math.random() * comments.length)];

    const hero = document.querySelector(".hero");

    const maxWidth = hero.offsetWidth - 300;
    const maxHeight = hero.offsetHeight - 120;

    const left = Math.random() * maxWidth;
    const top = Math.random() * maxHeight;

    box.style.left = left + "px";
    box.style.top = top + "px";

    commentLayer.appendChild(box);

    /* Prevent mobile double-tap zoom */
    box.style.touchAction = "manipulation";

    let tapCount = 0;
    let tapTimer = null;

    function triggerBurst() {
        const rect = box.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        createGoldenBurst(centerX, centerY);

        if (commentLayer.contains(box)) {
            commentLayer.removeChild(box);
        }

        // Reset scheduler and schedule next comment after 1 seconds
        clearTimeout(commentTimer);
        scheduleNextComment(1000); // 1000 ms = 1 seconds
    }

    box.addEventListener("pointerdown", function () {
        tapCount++;

        if (tapCount === 1) {
            tapTimer = setTimeout(() => {
                tapCount = 0;
            }, 300);
        } else if (tapCount === 2) {
            clearTimeout(tapTimer);
            tapCount = 0;
            triggerBurst();
        }
    });

    // Make the box visible, then hide & remove it after a delay
    setTimeout(() => {
        box.style.opacity = "1";
        box.style.transform = "scale(1)";
    }, 100);

    setTimeout(() => {
        box.style.opacity = "0";
        box.style.transform = "scale(0.9)";
    }, 3000);

    setTimeout(() => {
        if (commentLayer.contains(box)) {
            commentLayer.removeChild(box);
        }
    }, 4000);
    }

let commentTimer;

/**
 * scheduleNextComment(delay)
 * - delay (optional): milliseconds until next comment; defaults to 3000
 */
function scheduleNextComment(delay = 3000) {
    // clear any existing to be safe
    clearTimeout(commentTimer);
    commentTimer = setTimeout(() => {
        showRandomComment();
        scheduleNextComment(); // after showing, schedule next with default delay
    }, delay);
    }
    
showRandomComment();
scheduleNextComment(); // starts the loop with default 3000ms for normal auto-appear

</script>

</body>
</html>
