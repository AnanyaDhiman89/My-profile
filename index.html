<!DOCTYPE html>
<html>
<head>
<title>My Profile</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

.hero {
    position: relative;
    height: 100vh;
    background-image: url("Screenshot_2026-02-26-14-47-00-466.jpeg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed; /* subtle parallax */
    display: flex;
    justify-content: center;
    align-items: center;
    color: #E0FFFF;
    text-align: center;
    overflow: hidden;
    box-shadow: inset 0 0 100px rgba(0,0,0,0.4);
}

.hero::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:200px;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0%,
        #5F9EA0 100%
    );
    z-index:4;
}

#typing-text{
    position:relative;
    z-index:7;
    font-size:48px;
    opacity:0;
    background:rgba(0,0,0,0.4);
    padding:15px 30px;
    border-radius:10px;
    text-shadow:0 0 10px rgba(255,255,255,0.6);
    animation:fadeIn 1.5s forwards;
}

@keyframes fadeIn{
    to{opacity:1;}
}

canvas{
    position:absolute;
    inset:0;
}

#particles{z-index:1;}
#petals{z-index:3;}
#mouseCanvas{z-index:6; pointer-events:none;}

.profile{
    background-color:#5F9EA0;
    padding:100px 0;
    text-align:center;
}

.profile img{
    width:300px;
    border-radius:15px;
}
</style>
</head>

<script>
const petalColors = ["#FF69B4", "#FFB6C1"];

function createPetal() {
    const petal = document.createElement("div");
    petal.classList.add("petal");

    petal.style.left = Math.random() * window.innerWidth + "px";
    petal.style.background = petalColors[Math.floor(Math.random() * petalColors.length)];

    const size = 20 + Math.random() * 15; 
    petal.style.width = size + "px";
    petal.style.height = size * 1.3 + "px";

    const duration = 9 + Math.random() * 4;
    petal.style.animationDuration = duration + "s";

    document.body.appendChild(petal);

    setTimeout(() => {
        petal.remove();
    }, duration * 1000);
}

setInterval(createPetal, 600);
</script>

<body>

<section class="hero">
    <canvas id="particles"></canvas>
    <canvas id="petals"></canvas>
    <canvas id="mouseCanvas"></canvas>
    <h1 id="typing-text"></h1>
</section>

<section class="profile">
    <img src="Screenshot_2026-02-25-18-16-23-301.jpeg" alt="My Profile Image">
</section>

<script>

/* ---------- Resize Canvas ---------- */
function resizeCanvas(){
    document.querySelectorAll("canvas").forEach(c=>{
        c.width=window.innerWidth;
        c.height=window.innerHeight;
    });
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

/* ---------- Typing ---------- */
const text="Welcome to My World";
const typingElement=document.getElementById("typing-text");
let index=0;

function typeLetter(){
    if(index<text.length){
        typingElement.innerHTML+=text.charAt(index);
        index++;
        setTimeout(typeLetter,80);
    }else{
        typingElement.style.textShadow="0 0 25px rgba(255,255,255,0.9)";
        setTimeout(()=>{
            typingElement.style.textShadow="0 0 10px rgba(255,255,255,0.6)";
        },800);
    }
}
window.onload=typeLetter;

/* ---------- Floating Sparkles ---------- */
const pCanvas=document.getElementById("particles");
const pCtx=pCanvas.getContext("2d");
let sparkles=[];

for(let i=0;i<40;i++){
    sparkles.push({
        x:Math.random()*pCanvas.width,
        y:Math.random()*pCanvas.height,
        radius:Math.random()*2,
        speed:Math.random()*0.5
    });
}

function animateSparkles(){
    pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
    pCtx.fillStyle="rgba(255,255,255,0.5)";
    sparkles.forEach(s=>{
        pCtx.beginPath();
        pCtx.arc(s.x,s.y,s.radius,0,Math.PI*2);
        pCtx.fill();
        s.y-=s.speed;
        if(s.y<0) s.y=pCanvas.height;
    });
    requestAnimationFrame(animateSparkles);
}
animateSparkles();

/* ---------- Petals ---------- */
.petal {
    position: fixed;
    top: -60px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0.85;
    pointer-events: none;
    animation: fall linear forwards;
}

@keyframes fall {
    0% {
        transform: translateY(0) rotate(0deg);
    }
    50% {
        transform: translateY(50vh) rotate(120deg) translateX(15px);
    }
    100% {
        transform: translateY(100vh) rotate(240deg) translateX(-15px);
    }
    }
/* ---------- Golden Mouse Magic ---------- */
const mouseCanvas=document.getElementById("mouseCanvas");
const mouseCtx=mouseCanvas.getContext("2d");
let mouseParticles=[];

document.addEventListener("mousemove",e=>{
    for(let i=0;i<5;i++){
        mouseParticles.push({
            x:e.pageX,
            y:e.pageY,
            radius:2+Math.random()*3,
            alpha:1,
            speedX:(Math.random()-0.5)*3,
            speedY:(Math.random()-0.5)*3
        });
    }
});

document.addEventListener("click",e=>{
    for(let i=0;i<30;i++){
        mouseParticles.push({
            x:e.pageX,
            y:e.pageY,
            radius:3+Math.random()*5,
            alpha:1,
            speedX:(Math.random()-0.5)*7,
            speedY:(Math.random()-0.5)*7
        });
    }
});

function animateMouse(){
    mouseCtx.clearRect(0,0,mouseCanvas.width,mouseCanvas.height);

    for(let i=mouseParticles.length-1;i>=0;i--){
        let p=mouseParticles[i];

        mouseCtx.fillStyle="rgba(255,215,0,"+p.alpha+")";
        mouseCtx.beginPath();
        mouseCtx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        mouseCtx.fill();

        p.x+=p.speedX;
        p.y+=p.speedY;
        p.alpha-=0.03;

        if(p.alpha<=0){
            mouseParticles.splice(i,1);
        }
    }

    requestAnimationFrame(animateMouse);
}
animateMouse();

</script>

</body>
</html>
