<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>

    <style>
        body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Hero Section (Full Screen Background Image) */
.hero {
    position: relative;
    height: 100vh;
    background-image: url("Screenshot_2026-02-26-14-47-00-466.jpeg");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #E0FFFF;
    text-align: center;
    overflow: hidden;
}
.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    backdrop-filter: blur(8px);
    mask-image: radial-gradient(circle, black 70%, transparent 100%);
    z-index: 1;
}

.hero::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 200px;
    background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0%,
        #5F9EA0 100%
    );
    z-index: 1;
}
.hero h1 {
    position: relative;
    z-index: 2;
    font-size: 48px;
    background: rgba(0, 0, 0, 0.4);
    padding: 15px 30px;
    border-radius: 10px;
    }

/* Second Section */
.profile {
    background-color: #5F9EA0;
    padding: 100px 0;
    text-align: center;
}

.profile img {
    width: 300px;
    border-radius: 15px;
}
    </style>

</head>

<body>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to My World</h1>
    </section>

    <!-- Profile Section -->
    <section class="profile">
        <div class="container">
            <img src="Screenshot_2026-02-25-18-16-23-301.jpeg" alt="My Profile Image">
        </div>
    </section>

</body>
</html>
